<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0A0A0A"/>
  <!-- Crown body: 3 points -->
  <polygon points="15,72 15,42 30,62 50,28 70,62 85,42 85,72" fill="#F5C842"/>
  <!-- Crown band (slightly darker gold) -->
  <rect x="13" y="70" width="74" height="14" rx="4" fill="#D4AA2A"/>
  <!-- Gem cutouts on band -->
  <circle cx="50" cy="77" r="5" fill="#0A0A0A"/>
  <circle cx="28" cy="77" r="4" fill="#0A0A0A"/>
  <circle cx="72" cy="77" r="4" fill="#0A0A0A"/>
  <!-- Gem highlights -->
  <circle cx="50" cy="77" r="2.5" fill="#F5C842" opacity="0.45"/>
  <circle cx="28" cy="77" r="2" fill="#F5C842" opacity="0.45"/>
  <circle cx="72" cy="77" r="2" fill="#F5C842" opacity="0.45"/>
  <!-- Point caps -->
  <circle cx="15" cy="42" r="3.5" fill="#F5C842"/>
  <circle cx="50" cy="28" r="4" fill="#F5C842"/>
  <circle cx="85" cy="42" r="3.5" fill="#F5C842"/>
</svg>
